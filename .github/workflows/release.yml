name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build .plugin and .skill files
        run: |
          cd $GITHUB_WORKSPACE

          # Build .plugin (full bundle)
          zip -r numeric-toolkit.zip . \
            -x "*.git*" \
            -x "*.DS_Store" \
            -x ".github/*" \
            -x "*.zip"
          echo "Built: $(du -sh numeric-toolkit.zip)"

          # Build one .skill zip per skill directory
          mkdir -p dist
          for skill_dir in skills/*/; do
            skill=$(basename "$skill_dir")
            zip -r "dist/${skill}.skill" "$skill_dir" -x "*.DS_Store"
            echo "Built: $(du -sh "dist/${skill}.skill")"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            numeric-toolkit.zip
            dist/*.skill
          generate_release_notes: true
          body: |
            ## Install

            **As a plugin (recommended)**
            Download `numeric-toolkit.zip` below and open it in Cowork or Claude Code.

            **Via Claude Code CLI**
            ```
            claude plugin install https://github.com/${{ github.repository }}
            ```

            **Individual skills**
            Download any `.skill` file below and open it in Cowork or Claude Code.
