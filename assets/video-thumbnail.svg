<svg width="600" height="338" viewBox="0 0 600 338" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1638;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080810;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="338" fill="url(#bg-grad)" rx="8"/>

  <!-- Numeric MCP label - top left -->
  <text x="28" y="34" font-family="Arial, sans-serif" font-size="13" fill="#6B5DC6" font-weight="600" letter-spacing="1">NUMERIC MCP</text>

  <!-- Main title -->
  <text x="300" y="138" font-family="Arial, sans-serif" font-size="19" fill="#ffffff" font-weight="700" text-anchor="middle">End-to-End Accruals Processing</text>
  <text x="300" y="163" font-family="Arial, sans-serif" font-size="19" fill="#ffffff" font-weight="700" text-anchor="middle">using the Numeric MCP</text>

  <!-- Play button circle -->
  <circle cx="300" cy="220" r="40" fill="#3E3A7A"/>

  <!-- Play triangle -->
  <polygon points="290,206 290,234 318,220" fill="white"/>

  <!-- Bottom label -->
  <text x="300" y="294" font-family="Arial, sans-serif" font-size="13" fill="#9999a4" text-anchor="middle">Click to watch on Loom</text>

  <!-- Border -->
  <rect width="598" height="336" x="1" y="1" fill="none" stroke="#3E3A7A" stroke-width="1.5" stroke-opacity="0.5" rx="7"/>
</svg>
